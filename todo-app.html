<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow – To-Do App</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #23233a;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --text: #f0eeff;
    --muted: #8888aa;
    --danger: #ff5c72;
    --success: #22d3a5;
    --border: rgba(108,99,255,0.2);
    --radius: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 2rem 1rem;
  }

  .app {
    width: 100%;
    max-width: 560px;
  }

  header {
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 4px;
  }

  .stats {
    display: flex;
    gap: 1rem;
    margin-top: 1rem;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.5rem 1rem;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .stat span {
    color: var(--accent2);
    font-weight: 700;
    font-size: 1.1rem;
    display: block;
  }

  /* Input */
  .input-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .input-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-row input:focus {
    border-color: var(--accent);
  }

  .input-row input::placeholder { color: var(--muted); }

  .btn-add {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 0.75rem 1.2rem;
    font-size: 1.3rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    line-height: 1;
  }

  .btn-add:hover { background: #5a52e0; }
  .btn-add:active { transform: scale(0.95); }

  /* Filters */
  .filters {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 0.4rem 1rem;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  .filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent2); }

  /* Clear completed */
  .actions-row {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 0.75rem;
  }

  .btn-clear {
    background: none;
    border: none;
    color: var(--danger);
    font-size: 0.8rem;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
  }

  .btn-clear:hover { opacity: 1; }

  /* Task list */
  #task-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    min-height: 80px;
  }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.85rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    transition: border-color 0.2s, opacity 0.2s;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .task-item:hover { border-color: rgba(108,99,255,0.4); }

  .task-item.completed { opacity: 0.55; }

  /* Checkbox */
  .task-check {
    width: 20px;
    height: 20px;
    min-width: 20px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    font-size: 0.75rem;
    color: #fff;
  }

  .task-item.completed .task-check {
    background: var(--success);
    border-color: var(--success);
  }

  /* Task text */
  .task-text {
    flex: 1;
    font-size: 0.95rem;
    word-break: break-word;
    outline: none;
  }

  .task-item.completed .task-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .task-text[contenteditable="true"] {
    border-bottom: 1px dashed var(--accent);
    padding-bottom: 1px;
  }

  /* Task actions */
  .task-actions {
    display: flex;
    gap: 0.4rem;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .task-item:hover .task-actions { opacity: 1; }

  .icon-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
    padding: 4px;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
  }

  .icon-btn:hover { background: var(--surface2); }
  .icon-btn.edit:hover { color: var(--accent2); }
  .icon-btn.delete:hover { color: var(--danger); }

  /* Empty state */
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 2rem;
    font-size: 0.9rem;
    display: none;
  }

  .empty-icon { font-size: 2rem; margin-bottom: 0.5rem; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>TaskFlow</h1>
    <p>Stay on top of what matters.</p>
    <div class="stats">
      <div class="stat"><span id="stat-total">0</span>Total</div>
      <div class="stat"><span id="stat-active">0</span>Active</div>
      <div class="stat"><span id="stat-done">0</span>Done</div>
    </div>
  </header>

  <div class="input-row">
    <input type="text" id="task-input" placeholder="Add a new task…" maxlength="200" />
    <button class="btn-add" id="add-btn" title="Add task">+</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
  </div>

  <div class="actions-row">
    <button class="btn-clear" id="clear-btn">Clear completed</button>
  </div>

  <div id="task-list"></div>
  <div class="empty" id="empty-state">
    <div class="empty-icon">✅</div>
    <p>Nothing here. Add a task above!</p>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────
  const STORAGE_KEY = 'taskflow_tasks';
  let tasks = [];
  let currentFilter = 'all';

  function loadTasks() {
    try {
      tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch { tasks = []; }
  }

  function saveTasks() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  // ── CRUD ──────────────────────────────────────────────
  function addTask(text) {
    if (!text.trim()) return;
    tasks.unshift({ id: generateId(), text: text.trim(), completed: false, createdAt: Date.now() });
    saveTasks();
    render();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.completed = !t.completed; saveTasks(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    render();
  }

  function updateTask(id, newText) {
    const t = tasks.find(t => t.id === id);
    if (t && newText.trim()) { t.text = newText.trim(); saveTasks(); }
    else if (t && !newText.trim()) { deleteTask(id); }
  }

  function clearCompleted() {
    tasks = tasks.filter(t => !t.completed);
    saveTasks();
    render();
  }

  // ── Render ─────────────────────────────────────────────
  function getFiltered() {
    if (currentFilter === 'active') return tasks.filter(t => !t.completed);
    if (currentFilter === 'completed') return tasks.filter(t => t.completed);
    return tasks;
  }

  function render() {
    const list = document.getElementById('task-list');
    const empty = document.getElementById('empty-state');
    const filtered = getFiltered();

    // Stats
    document.getElementById('stat-total').textContent = tasks.length;
    document.getElementById('stat-active').textContent = tasks.filter(t => !t.completed).length;
    document.getElementById('stat-done').textContent = tasks.filter(t => t.completed).length;

    if (filtered.length === 0) {
      list.innerHTML = '';
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      list.innerHTML = filtered.map(t => `
        <div class="task-item ${t.completed ? 'completed' : ''}" data-id="${t.id}">
          <button class="task-check" onclick="toggleTask('${t.id}')" title="Toggle complete">
            ${t.completed ? '✓' : ''}
          </button>
          <span class="task-text" data-id="${t.id}">${escapeHtml(t.text)}</span>
          <div class="task-actions">
            <button class="icon-btn edit" onclick="startEdit('${t.id}')" title="Edit">✏️</button>
            <button class="icon-btn delete" onclick="deleteTask('${t.id}')" title="Delete">🗑️</button>
          </div>
        </div>
      `).join('');
    }
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Inline Edit ────────────────────────────────────────
  function startEdit(id) {
    const span = document.querySelector(`.task-text[data-id="${id}"]`);
    if (!span) return;
    span.contentEditable = 'true';
    span.focus();

    // Move cursor to end
    const range = document.createRange();
    range.selectNodeContents(span);
    range.collapse(false);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);

    function finishEdit() {
      span.contentEditable = 'false';
      updateTask(id, span.textContent);
      span.removeEventListener('blur', finishEdit);
      span.removeEventListener('keydown', onKey);
    }

    function onKey(e) {
      if (e.key === 'Enter') { e.preventDefault(); finishEdit(); }
      if (e.key === 'Escape') { span.contentEditable = 'false'; render(); }
    }

    span.addEventListener('blur', finishEdit);
    span.addEventListener('keydown', onKey);
  }

  // ── Event Listeners (delegated) ────────────────────────
  document.getElementById('add-btn').addEventListener('click', () => {
    const input = document.getElementById('task-input');
    addTask(input.value);
    input.value = '';
    input.focus();
  });

  document.getElementById('task-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('add-btn').click();
  });

  document.getElementById('clear-btn').addEventListener('click', clearCompleted);

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  // ── Init ───────────────────────────────────────────────
  loadTasks();
  render();
</script>
</body>
</html>
